<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TikTok Live Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff6ec4, #ff9a44);
      color: #fff;
      text-align: center;
      height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: rgba(0,0,0,0.4);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    h1 {
      margin-bottom: 20px;
      font-size: 2em;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ff0069;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 12px 25px;
      font-size: 1.1em;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.3s ease;
      margin: 10px;
    }
    .btn:hover {
      transform: scale(1.05);
      background: #ff4f81;
    }
    .btn i {
      margin-right: 10px;
      font-size: 1.3em;
    }
    #status {
      margin-top: 20px;
      font-size: 1.2em;
      font-weight: bold;
    }
  </style>
  <!-- TikTok icon via Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <h1><i class="fa-brands fa-tiktok"></i> TikTok Live Integration</h1>
    <button class="btn" onclick="connectTikTok()">
      <i class="fa-brands fa-tiktok"></i> Connect TikTok
    </button>
    <button class="btn" onclick="goLive()">
      <i class="fa-solid fa-video"></i> Go Live
    </button>
    <div id="status"></div>
  </div>

  <script>
    function connectTikTok() {
      window.location.href = "/auth/tiktok";
    }
    async function goLive() {
      const res = await fetch("/start-live");
      const data = await res.json();
      document.getElementById("status").innerText = data.message;
    }
  </script>
</body>
</html>
